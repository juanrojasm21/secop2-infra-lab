name: Lambda CI/CD — SECOP II

on:
  push:
    branches:
      - dev
    paths:
      - 'modules/lambda/**'

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION: secop2-dev-integrations
  LAMBDA_ALIAS: live

jobs:
  validate:
    name: Validación
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest boto3 checkov
      - run: pytest modules/lambda/tests/ -v
      - run: checkov -d modules/lambda --framework terraform --quiet

  package:
    name: Empaquetado
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: cd modules/lambda && zip -r lambda.zip index.py
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: modules/lambda/lambda.zip
          retention-days: 5

  deploy:
    name: Despliegue
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: modules/lambda/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: |
          terraform apply \
            -target=module.lambda \
            -var-file="example.tfvars" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -auto-approve

  canary:
    name: Canary Release
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener versiones
        id: versions
        run: |
          STABLE=$(aws lambda get-alias \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --name ${{ env.LAMBDA_ALIAS }} \
            --query 'FunctionVersion' --output text)
          NEW=$(aws lambda list-versions-by-function \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --query 'Versions[-1].Version' --output text)
          echo "stable=$STABLE" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Activar Canary 10/90
        run: |
          aws lambda update-alias \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --name ${{ env.LAMBDA_ALIAS }} \
            --function-version ${{ steps.versions.outputs.stable }} \
            --routing-config \
              AdditionalVersionWeights={"${{ steps.versions.outputs.new }}"=0.1}

      - name: Monitorear 10 minutos
        run: |
          sleep 600
          ERRORS=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Errors \
            --dimensions Name=FunctionName,Value=${{ env.LAMBDA_FUNCTION }} \
            --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --period 600 --statistics Sum \
            --query 'Datapoints[0].Sum' --output text)
          if (( $(echo "$ERRORS > 5" | bc -l) )); then
            echo "ROLLBACK=true" >> $GITHUB_ENV
          else
            echo "ROLLBACK=false" >> $GITHUB_ENV
          fi

      - name: Promover al 100%
        if: env.ROLLBACK == 'false'
        run: |
          aws lambda update-alias \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --name ${{ env.LAMBDA_ALIAS }} \
            --function-version ${{ steps.versions.outputs.new }} \
            --routing-config AdditionalVersionWeights={}

      - name: Rollback a versión estable
        if: env.ROLLBACK == 'true'
        run: |
          aws lambda update-alias \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --name ${{ env.LAMBDA_ALIAS }} \
            --function-version ${{ steps.versions.outputs.stable }} \
            --routing-config AdditionalVersionWeights={}
          exit 1