name: Lambda CI/CD — SECOP II

on:
  push:
    branches:
      - dev
    paths:
      - 'modules/lambda/**'

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION: secop2-dev-integrations
  LAMBDA_ALIAS: live

jobs:
  # ── Etapa 1: Validación ──────────────────────────────────────────────
  validate:
    name: Validación
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r modules/lambda/requirements.txt

      - name: Ejecutar pruebas unitarias
        run: pytest modules/lambda/tests/ -v

      - name: Escaneo de seguridad con Checkov
        run: |
          pip install checkov
          checkov -d modules/lambda \
            --framework terraform \
            --quiet

  # ── Etapa 2: Empaquetado ─────────────────────────────────────────────
  package:
    name: Empaquetado
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar lambda.zip
        run: |
          cd modules/lambda
          zip -r lambda.zip index.py

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: modules/lambda/lambda.zip
          retention-days: 5

  # ── Etapa 3: Despliegue ──────────────────────────────────────────────
  deploy:
    name: Despliegue
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: modules/lambda/

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply — solo módulo Lambda
        run: |
          terraform apply \
            -target=module.lambda \
            -var-file="example.tfvars" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -auto-approve

  # ── Etapa 4: Canary Release ──────────────────────────────────────────
  canary:
    name: Canary Release
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener versiones
        id: versions
        run: |
          STABLE=$(aws lambda get-alias \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --name ${{ env.LAMBDA_ALIAS }} \
            --query 'FunctionVersion' --output text)

          NEW=$(aws lambda list-versions-by-function \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --query 'Versions[-1].Version' --output text)

          echo "stable=$STABLE" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Activar Canary — 10% nueva versión / 90% estable
        run: |
          aws lambda update-alias \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --name ${{ env.LAMBDA_ALIAS }} \
            --function-version ${{ steps.versions.outputs.stable }} \
            --routing-config \
              AdditionalVersionWeights={"${{ steps.versions.outputs.new }}"=0.1}

      - name: Monitorear métricas durante 10 minutos
        run: |
          sleep 600
          ERRORS=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/Lambda \
            --metric-name Errors \
            --dimensions Name=FunctionName,Value=${{ env.LAMBDA_FUNCTION }} \
            --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --period 600 --statistics Sum \
            --query 'Datapoints[0].Sum' --output text)

          if (( $(echo "$ERRORS > 5" | bc -l) )); then
            echo "ROLLBACK=true" >> $GITHUB_ENV
          else
            echo "ROLLBACK=false" >> $GITHUB_ENV
          fi

      - name: Promover al 100%
        if: env.ROLLBACK == 'false'
        run: |
          aws lambda update-alias \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --name ${{ env.LAMBDA_ALIAS }} \
            --function-version ${{ steps.versions.outputs.new }} \
            --routing-config AdditionalVersionWeights={}
          echo "✅ Promoción exitosa — v${{ steps.versions.outputs.new }} al 100%"

      - name: Rollback a versión estable
        if: env.ROLLBACK == 'true'
        run: |
          aws lambda update-alias \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --name ${{ env.LAMBDA_ALIAS }} \
            --function-version ${{ steps.versions.outputs.stable }} \
            --routing-config AdditionalVersionWeights={}
          echo "⚠️ Rollback ejecutado — v${{ steps.versions.outputs.stable }} restaurada"
          exit 1